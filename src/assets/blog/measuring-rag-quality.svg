<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>How we actually measure RAG quality</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="540" cy="180" rx="200" ry="175" fill="url(#glow)"/>

  <!-- quality gauge: arc, ticks, needle past the threshold -->
  <g transform="translate(540,210)">
    <path d="M-78 0 A78 78 0 0 1 78 0" fill="none" stroke="#2a3038" stroke-width="8" stroke-linecap="round"/>
    <path d="M-78 0 A78 78 0 0 1 40 -67" fill="none" stroke="#22D3EE" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <!-- ticks -->
    <g stroke="#3a4049" stroke-width="1.5">
      <line x1="-66" y1="-32" x2="-58" y2="-28"/>
      <line x1="-32" y1="-66" x2="-28" y2="-58"/>
      <line x1="0" y1="-78" x2="0" y2="-68"/>
      <line x1="32" y1="-66" x2="28" y2="-58"/>
      <line x1="66" y1="-32" x2="58" y2="-28"/>
    </g>
    <!-- gate threshold marker -->
    <line x1="22" y1="-75" x2="30" y2="-100" stroke="#8B5CF6" stroke-width="1.6" opacity="0.7"/>
    <text x="34" y="-100" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#8B5CF6" opacity="0.8">CI gate</text>
    <!-- needle -->
    <line x1="0" y1="0" x2="46" y2="-52" stroke="#f2f5f7" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="#22D3EE"/>
  </g>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#22D3EE">RAG · EVALUATION</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">How We Actually</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Measure RAG</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#22D3EE">Quality</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#22D3EE" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Decompose by stage · eval set from real failures · calibrate the judge</text>
</svg>
