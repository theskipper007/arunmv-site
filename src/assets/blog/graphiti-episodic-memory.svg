<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Episodic memory for agents with Graphiti</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="520" cy="175" rx="200" ry="170" fill="url(#glow)"/>

  <!-- temporal axis: bi-temporal timeline -->
  <line x1="430" y1="300" x2="650" y2="300" stroke="#22D3EE" stroke-width="1" opacity="0.25"/>
  <g fill="#22D3EE" opacity="0.45">
    <circle cx="455" cy="300" r="1.8"/><circle cx="500" cy="300" r="1.8"/>
    <circle cx="545" cy="300" r="1.8"/><circle cx="590" cy="300" r="1.8"/>
    <circle cx="635" cy="300" r="1.8"/>
  </g>

  <!-- knowledge graph constellation -->
  <g stroke="#22D3EE" stroke-width="1" opacity="0.35" fill="none">
    <line x1="520" y1="175" x2="448" y2="115"/>
    <line x1="520" y1="175" x2="608" y2="120"/>
    <line x1="520" y1="175" x2="618" y2="235"/>
    <line x1="520" y1="175" x2="452" y2="245"/>
    <line x1="520" y1="175" x2="560" y2="90"/>
    <line x1="448" y1="115" x2="560" y2="90"/>
    <line x1="608" y1="120" x2="618" y2="235"/>
    <line x1="452" y1="245" x2="618" y2="235"/>
  </g>
  <g fill="#0a0d12" stroke="#22D3EE" stroke-width="1.4">
    <circle cx="448" cy="115" r="7"/><circle cx="608" cy="120" r="6"/>
    <circle cx="618" cy="235" r="7"/><circle cx="452" cy="245" r="6"/>
    <circle cx="560" cy="90" r="5"/>
  </g>
  <circle cx="520" cy="175" r="16" fill="#22D3EE" opacity="0.5" filter="url(#blur)"/>
  <circle cx="520" cy="175" r="10" fill="#22D3EE"/>
  <circle cx="520" cy="175" r="10" fill="#0a0d12" opacity="0.25"/>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#22D3EE">KNOWLEDGE GRAPHS · PART 2</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Episodic Memory</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">for AI Agents,</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#22D3EE">with Graphiti</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#22D3EE" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Bi-temporal knowledge · what's true now, and what was true when</text>
</svg>
