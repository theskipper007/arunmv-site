<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Why knowledge graphs beat vector-only RAG</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="525" cy="185" rx="200" ry="175" fill="url(#glow)"/>

  <!-- left: scattered vector points (the "flat" alternative) -->
  <g fill="#475569" opacity="0.55">
    <circle cx="430" cy="120" r="2.4"/><circle cx="448" cy="150" r="2.4"/>
    <circle cx="425" cy="182" r="2.4"/><circle cx="452" cy="215" r="2.4"/>
    <circle cx="432" cy="250" r="2.4"/><circle cx="460" cy="282" r="2.4"/>
  </g>

  <!-- arrow into structure -->
  <path d="M474 200 H498" stroke="#22D3EE" stroke-width="1.4" opacity="0.4"/>
  <path d="M492 195 l8 5 -8 5" fill="none" stroke="#22D3EE" stroke-width="1.4" opacity="0.4"/>

  <!-- right: connected knowledge graph -->
  <g stroke="#22D3EE" stroke-width="1" opacity="0.4" fill="none">
    <line x1="565" y1="185" x2="525" y2="115"/>
    <line x1="565" y1="185" x2="625" y2="130"/>
    <line x1="565" y1="185" x2="635" y2="225"/>
    <line x1="565" y1="185" x2="540" y2="265"/>
    <line x1="525" y1="115" x2="625" y2="130"/>
    <line x1="635" y1="225" x2="540" y2="265"/>
  </g>
  <g fill="#0a0d12" stroke="#22D3EE" stroke-width="1.4">
    <circle cx="525" cy="115" r="7"/><circle cx="625" cy="130" r="6"/>
    <circle cx="635" cy="225" r="6"/><circle cx="540" cy="265" r="7"/>
  </g>
  <circle cx="565" cy="185" r="15" fill="#22D3EE" opacity="0.5" filter="url(#blur)"/>
  <circle cx="565" cy="185" r="10" fill="#22D3EE"/>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#22D3EE">KNOWLEDGE GRAPHS · PART 1</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Why Knowledge</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Graphs Beat</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#22D3EE">Vector-Only RAG</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#22D3EE" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">From similarity-ranked chunks to entities and relationships</text>
</svg>
