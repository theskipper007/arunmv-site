<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The Ground Beneath My Game: what a ball taught me about life</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="540" cy="195" rx="200" ry="180" fill="url(#glow)"/>

  <!-- isometric pitch -->
  <g stroke="#34D399" stroke-width="1.1" fill="none" opacity="0.4">
    <polygon points="430,250 545,318 660,250 545,182"/>
    <!-- halfway line -->
    <line x1="487" y1="216" x2="602" y2="284"/>
    <!-- centre circle -->
    <ellipse cx="545" cy="250" rx="34" ry="19"/>
    <!-- penalty box (near) -->
    <polygon points="500,295 545,318 590,295 545,272" opacity="0.7"/>
  </g>
  <circle cx="545" cy="250" r="2.6" fill="#34D399" opacity="0.7"/>

  <!-- ball trajectory arc + ball -->
  <path d="M462 258 Q 520 150 596 196" fill="none" stroke="#34D399" stroke-width="1.4" opacity="0.55" stroke-dasharray="2 6"/>
  <circle cx="596" cy="196" r="15" fill="#34D399" opacity="0.4" filter="url(#blur)"/>
  <circle cx="596" cy="196" r="9" fill="#0a0d12" stroke="#34D399" stroke-width="1.6"/>
  <path d="M596 188 l5 4 -2 6 -6 0 -2 -6 z" fill="#34D399" opacity="0.85"/>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#34D399">FOOTBALL · TEN LESSONS</text>
  <text x="55" y="164" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">The Ground</text>
  <text x="55" y="208" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Beneath</text>
  <text x="55" y="246" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#34D399">My Game</text>
  <line x1="56" y1="266" x2="200" y2="266" stroke="#34D399" stroke-width="2" opacity="0.7"/>
  <text x="56" y="314" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Resilience, consistency, and rewriting your own story</text>
</svg>
