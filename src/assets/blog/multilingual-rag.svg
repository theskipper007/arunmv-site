<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Multilingual RAG, where the languages are code</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="540" cy="180" rx="200" ry="175" fill="url(#glow)"/>

  <!-- big code braces with token squares (many languages) -->
  <text x="438" y="232" font-family="'SFMono-Regular', Consolas, monospace" font-size="150" font-weight="700" fill="#8B5CF6" opacity="0.18">{ }</text>
  <g>
    <rect x="500" y="138" width="20" height="14" rx="2" fill="#1f2436" stroke="#6366F1" stroke-width="1"/>
    <rect x="528" y="138" width="34" height="14" rx="2" fill="#1f2436" stroke="#22D3EE" stroke-width="1"/>
    <rect x="500" y="160" width="44" height="14" rx="2" fill="#1f2436" stroke="#8B5CF6" stroke-width="1"/>
    <rect x="552" y="160" width="24" height="14" rx="2" fill="#1f2436" stroke="#6366F1" stroke-width="1"/>
    <rect x="500" y="200" width="30" height="14" rx="2" fill="#1f2436" stroke="#22D3EE" stroke-width="1"/>
    <rect x="538" y="200" width="38" height="14" rx="2" fill="#1f2436" stroke="#8B5CF6" stroke-width="1"/>
    <rect x="500" y="222" width="26" height="14" rx="2" fill="#1f2436" stroke="#6366F1" stroke-width="1"/>
  </g>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#8B5CF6">RAG · CODE RETRIEVAL</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Multilingual RAG,</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Where the</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#8B5CF6">Languages Are Code</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#8B5CF6" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Code embeddings · identifier-aware retrieval · structure-aware chunks</text>
</svg>
