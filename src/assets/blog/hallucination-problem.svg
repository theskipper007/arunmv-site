<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The hallucination problem: what reduced ours, what didn't</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="540" cy="180" rx="200" ry="175" fill="url(#glow)"/>

  <!-- noisy signal resolving into a clean, cited line -->
  <path d="M432 182 q6 -34 12 0 t12 0 -12 0 q6 30 12 0 t12 -2 q8 -40 14 2 t12 -2"
        fill="none" stroke="#3a4049" stroke-width="1.4" opacity="0.7"/>
  <path d="M540 182 H650" fill="none" stroke="#22D3EE" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="540" cy="182" r="6" fill="#22D3EE"/>
  <circle cx="540" cy="182" r="14" fill="#22D3EE" opacity="0.35" filter="url(#blur)"/>
  <!-- citation marks anchoring the clean answer -->
  <g fill="#8B5CF6">
    <text x="588" y="160" font-family="Georgia, serif" font-size="34" font-weight="700">"</text>
  </g>
  <g fill="#0a0d12" stroke="#8B5CF6" stroke-width="1.3">
    <circle cx="596" cy="182" r="4"/><circle cx="628" cy="182" r="4"/>
  </g>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#22D3EE">RELIABILITY · RETRIEVAL</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">The Hallucination</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Problem</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#22D3EE">What Worked, What Didn't</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#22D3EE" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Fix the context first · force citations · a sanctioned "I don't know"</text>
</svg>
