<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Making AI production-ready isn't about the model</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0A458" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#E0A458" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="525" cy="185" rx="200" ry="175" fill="url(#glow)"/>

  <!-- stacked reliability layers (isometric) -->
  <g opacity="0.9">
    <g transform="translate(478,236)">
      <polygon points="0,30 70,70 140,30 70,-10" fill="#161a20" stroke="#2a3038" stroke-width="1"/>
      <polygon points="0,30 0,18 70,58 70,70" fill="#10141a"/>
      <polygon points="140,30 140,18 70,58 70,70" fill="#0d1116"/>
    </g>
    <g transform="translate(478,202)">
      <polygon points="0,30 70,70 140,30 70,-10" fill="#161a20" stroke="#3a3026" stroke-width="1"/>
      <polygon points="0,30 0,18 70,58 70,70" fill="#10141a"/>
      <polygon points="140,30 140,18 70,58 70,70" fill="#0d1116"/>
    </g>
    <g transform="translate(478,166)">
      <polygon points="0,30 70,70 140,30 70,-10" fill="#1d1812" stroke="#E0A458" stroke-width="1.3"/>
      <polygon points="0,30 0,18 70,58 70,70" fill="#231a10"/>
      <polygon points="140,30 140,18 70,58 70,70" fill="#1a130b"/>
      <polygon points="0,30 70,70 140,30 70,-10" fill="#E0A458" opacity="0.16"/>
    </g>
  </g>
  <ellipse cx="548" cy="196" rx="42" ry="22" fill="#E0A458" opacity="0.18" filter="url(#blur)"/>

  <!-- observability waveform -->
  <path d="M428 110 H470 l8 -22 l10 40 l9 -28 l8 14 H650"
        fill="none" stroke="#E0A458" stroke-width="1.6" opacity="0.7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#E0A458">RELIABILITY · LLMOPS</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Production-Ready</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">AI Isn't About</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#E0A458">the Model</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#E0A458" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Retries · fallbacks · observability · cost discipline</text>
</svg>
