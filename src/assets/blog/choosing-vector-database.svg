<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Choosing a vector database: benchmarks from real workloads</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="540" cy="180" rx="200" ry="175" fill="url(#glow)"/>

  <!-- nearest-neighbor: query point with k links into an embedding cloud -->
  <g fill="#2f3550">
    <circle cx="462" cy="120" r="2.4"/><circle cx="500" cy="98" r="2.4"/>
    <circle cx="612" cy="128" r="2.4"/><circle cx="636" cy="200" r="2.4"/>
    <circle cx="470" cy="252" r="2.4"/><circle cx="592" cy="258" r="2.4"/>
    <circle cx="448" cy="186" r="2.4"/><circle cx="624" cy="250" r="2.4"/>
  </g>
  <!-- search radius -->
  <circle cx="540" cy="182" r="62" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4 5" opacity="0.5"/>
  <!-- k nearest -->
  <g stroke="#22D3EE" stroke-width="1.3" opacity="0.7">
    <line x1="540" y1="182" x2="508" y2="150"/>
    <line x1="540" y1="182" x2="582" y2="158"/>
    <line x1="540" y1="182" x2="566" y2="222"/>
    <line x1="540" y1="182" x2="502" y2="212"/>
  </g>
  <g fill="#0a0d12" stroke="#22D3EE" stroke-width="1.4">
    <circle cx="508" cy="150" r="5"/><circle cx="582" cy="158" r="5"/>
    <circle cx="566" cy="222" r="5"/><circle cx="502" cy="212" r="5"/>
  </g>
  <circle cx="540" cy="182" r="13" fill="#8B5CF6" opacity="0.5" filter="url(#blur)"/>
  <circle cx="540" cy="182" r="8" fill="#8B5CF6"/>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#8B5CF6">RETRIEVAL · BENCHMARKS</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Choosing a</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Vector Database</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#8B5CF6">Benchmark your own</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#8B5CF6" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Your vector count · your dimensions · your real filtering pattern</text>
</svg>
