<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>How to structure your agentic workflows</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="540" cy="180" rx="200" ry="175" fill="url(#glow)"/>

  <!-- five stacked layers of the workflow -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600">
    <rect x="452" y="110" width="178" height="26" rx="5" fill="#181d33" stroke="#6366F1" stroke-width="1.1"/>
    <text x="466" y="127" fill="#8a90b8">1 · Context file</text>
    <rect x="452" y="142" width="178" height="26" rx="5" fill="#171f30" stroke="#22D3EE" stroke-width="1.1"/>
    <text x="466" y="159" fill="#7fb4c4">2 · Plan gate</text>
    <rect x="452" y="174" width="178" height="26" rx="5" fill="#1b1d33" stroke="#8B5CF6" stroke-width="1.3"/>
    <text x="466" y="191" fill="#b39ddb">3 · Atomic tasks</text>
    <rect x="452" y="206" width="178" height="26" rx="5" fill="#171f30" stroke="#22D3EE" stroke-width="1.1"/>
    <text x="466" y="223" fill="#7fb4c4">4 · Git checkpoints</text>
    <rect x="452" y="238" width="178" height="26" rx="5" fill="#181d33" stroke="#6366F1" stroke-width="1.1"/>
    <text x="466" y="255" fill="#8a90b8">5 · Verification loop</text>
  </g>
  <!-- flow arrow down the stack -->
  <path d="M442 116 v142 m0 0 l-5 -7 m5 7 l5 -7" fill="none" stroke="#8B5CF6" stroke-width="1.4" opacity="0.55" stroke-linecap="round"/>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#8B5CF6">AGENTIC AI · WORKFLOW</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">How to Structure</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Your Agentic</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#8B5CF6">Workflows</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#8B5CF6" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Claude Code, Cursor, or any AI tool — five layers that stay trustworthy</text>
</svg>
