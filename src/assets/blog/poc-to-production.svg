<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>POC to production: what breaks when RAG meets real users</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="540" cy="180" rx="200" ry="175" fill="url(#glow)"/>

  <!-- staircase: POC up to PROD, with a crack in the happy path -->
  <g>
    <rect x="446" y="246" width="46" height="44" fill="#161b28" stroke="#2a3038" stroke-width="1"/>
    <rect x="492" y="212" width="46" height="78" fill="#191f30" stroke="#3a3a6a" stroke-width="1"/>
    <rect x="538" y="178" width="46" height="112" fill="#1d2440" stroke="#6366F1" stroke-width="1.1"/>
    <rect x="584" y="144" width="46" height="146" fill="#222a52" stroke="#8B5CF6" stroke-width="1.2"/>
    <rect x="584" y="144" width="46" height="146" fill="#6366F1" opacity="0.16"/>
  </g>
  <text x="452" y="238" font-family="Inter, sans-serif" font-size="9" font-weight="700" letter-spacing="0.1em" fill="#3a4049">POC</text>
  <text x="592" y="136" font-family="Inter, sans-serif" font-size="9" font-weight="700" letter-spacing="0.1em" fill="#8B5CF6">PROD</text>
  <!-- crack on the happy path -->
  <path d="M446 268 L470 268 L478 260 L486 274 L492 264" fill="none" stroke="#22D3EE" stroke-width="1.6" opacity="0.8" stroke-linejoin="round"/>
  <!-- climbing arrow -->
  <path d="M468 226 L514 192 L560 158 L606 124" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M606 124 l-13 3 l6 9 z" fill="#22D3EE" opacity="0.9"/>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#6366F1">RAG · PRODUCTION</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">POC to Production</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">What Breaks When</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#8B5CF6">RAG Meets Real Users</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#6366F1" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Tracing · drift · evals · learning to say "I don't have that part"</text>
</svg>
