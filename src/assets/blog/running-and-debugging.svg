<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>What distance running taught me about debugging</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="540" cy="190" rx="190" ry="170" fill="url(#glow)"/>

  <!-- the route: a long winding path, step by step to the finish -->
  <path id="route" d="M425 285 C 470 255, 455 210, 510 205 S 600 230, 615 180 S 560 120, 600 95"
        fill="none" stroke="#34D399" stroke-width="2" opacity="0.55" stroke-linecap="round" stroke-dasharray="2 7"/>
  <!-- pace markers -->
  <g fill="#34D399">
    <circle cx="425" cy="285" r="3.2" opacity="0.6"/>
    <circle cx="510" cy="205" r="3.2" opacity="0.7"/>
    <circle cx="615" cy="180" r="3.2" opacity="0.8"/>
  </g>
  <!-- finish: glowing endpoint -->
  <circle cx="600" cy="95" r="14" fill="#34D399" opacity="0.45" filter="url(#blur)"/>
  <circle cx="600" cy="95" r="6.5" fill="#34D399"/>
  <path d="M600 95 v-24" stroke="#34D399" stroke-width="1.4" opacity="0.7"/>
  <path d="M600 71 l16 5 -16 6 z" fill="#34D399" opacity="0.8"/>

  <!-- terminal cursor, tying it to debugging -->
  <text x="430" y="120" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" fill="#34D399" opacity="0.6">&gt;_</text>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#34D399">RUNNING · THE CRAFT</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">What Running</text>
  <text x="55" y="202" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Taught Me About</text>
  <text x="55" y="240" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#34D399">Debugging</text>
  <line x1="56" y1="260" x2="200" y2="260" stroke="#34D399" stroke-width="2" opacity="0.7"/>
  <text x="56" y="310" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Patience · a steady pace · trusting the process</text>
</svg>
