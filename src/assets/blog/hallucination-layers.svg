<svg viewBox="0 0 680 370" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Hallucination is a system design problem</title>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.9" fill="#ffffff" opacity="0.03"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="680" height="370" fill="#0a0d12"/>
  <rect width="680" height="370" fill="url(#dots)"/>
  <ellipse cx="540" cy="180" rx="200" ry="175" fill="url(#glow)"/>

  <!-- layered defense: concentric rings guarding a core -->
  <g fill="none">
    <circle cx="540" cy="182" r="76" stroke="#6366F1" stroke-width="1.2" stroke-dasharray="3 6" opacity="0.45"/>
    <circle cx="540" cy="182" r="58" stroke="#22D3EE" stroke-width="1.3" stroke-dasharray="3 6" opacity="0.55"/>
    <circle cx="540" cy="182" r="40" stroke="#8B5CF6" stroke-width="1.4" opacity="0.7"/>
  </g>
  <!-- ring labels (ground / constrain / verify) -->
  <circle cx="540" cy="106" r="3" fill="#6366F1"/>
  <circle cx="540" cy="124" r="3" fill="#22D3EE"/>
  <circle cx="540" cy="142" r="3" fill="#8B5CF6"/>
  <!-- core: verified claim -->
  <circle cx="540" cy="182" r="22" fill="#8B5CF6" opacity="0.4" filter="url(#blur)"/>
  <circle cx="540" cy="182" r="16" fill="#13172a" stroke="#8B5CF6" stroke-width="1.5"/>
  <path d="M531 182 l6 7 l12 -14" fill="none" stroke="#22D3EE" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- text -->
  <text x="56" y="106" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="0.16em" fill="#8B5CF6">RELIABILITY · SYSTEM DESIGN</text>
  <text x="55" y="162" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">Hallucination Is a</text>
  <text x="55" y="204" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em" fill="#f2f5f7">System Design</text>
  <text x="55" y="242" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" letter-spacing="-0.01em" fill="#8B5CF6">Problem, Not a Model One</text>
  <line x1="56" y1="262" x2="200" y2="262" stroke="#8B5CF6" stroke-width="2" opacity="0.7"/>
  <text x="56" y="312" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#3a4049">Ground · constrain · verify · measure — a layered defense</text>
</svg>
